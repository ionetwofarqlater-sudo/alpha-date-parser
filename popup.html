<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; width: 220px; padding: 12px; }
    button { width: 100%; margin: 4px 0; padding: 8px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
    #toggleBtn { font-weight: bold; font-size: 14px; }
    #toggleBtn.on  { background: #4caf50; color: #fff; border-color: #388e3c; }
    #toggleBtn.off { background: #f44336; color: #fff; border-color: #c62828; }
    #status { font-size: 12px; color: #555; margin-top: 8px; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 8px">Alpha Parser</h3>
  <button id="toggleBtn">...</button>
  <button id="export">Export JSON</button>
  <button id="clear">Clear data</button>
  <div id="status">Loading...</div>
  <script src="popup.js"></script>
</body>
</html>
